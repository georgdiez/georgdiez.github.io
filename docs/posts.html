    <script>
        function highlightActiveNav() {
            var path = window.location.pathname;
            document.querySelectorAll('.cd-primary-nav a').forEach(function(link) {
                var href = link.getAttribute('href');
                if (!href || href.indexOf('http') !== -1) return;
                var page = href.replace('./', '');
                var isActive = path.endsWith('/' + page) ||
                    (page === 'index.html' && (path === '/' || path.endsWith('/')));
                if (isActive) link.parentElement.classList.add('active');
            });

        $(function(){

            // Create dynamic grid based on screen width

        function createDynamicGrid() {
            const container = document.getElementById('posts-container');
            const posts = [
                {
                    id: 6,
                    image: "img/hp35_network.svg",
                    imageX: 50,
                    imageY: 50,
                    alt: "HP35 folding kinetic network",
                    date: "April 2, 2026",
                    readTime: "5 min read",
                    title: "A simple preprocessing step that changes what you see",
                    excerpt: `Our paper is out in JPCL! Standard dimensionality reduction can erase conformational states before you even start analyzing them.
                    We show that a simple Gaussian filter applied to the input coordinates — before any clustering — recovers
                    states that are genuinely there but cannot be resolved by conventional pipelines.`,
                    isPortrait: true,
                    fullContent: `<p>When you run a long molecular dynamics simulation, you end up with a trajectory of millions of
                        snapshots. Making sense of that data usually means reducing it to a handful of collective variables —
                        principal components, contact distances, dihedral angles — and then clustering those to find the distinct
                        conformational states.</p>

                        <p>The problem is that this reduction can lead to projection artifacts which can actively mask the 
                            information you're looking for. 
                            That is, important states that genuinely exist in the original high-dimensional input data
                            can be blurred with other states and therefore disappear as distinct functional (intermediate)
                            coformations of the protein.
                            You end up confidently finding the states that survived projection — with no indication that others ever existed.</p>

                        <p><strong>What we tried</strong></p>

                        <p>The fix, it turns out, is remarkably simple. Before projecting the trajectory onto collective
                        variables, apply a Gaussian filter along the time axis. This is a low-pass filter: it smooths out fast
                        local fluctuations while leaving the slower, larger-scale motions intact. The result is that transient
                        states — which previously blurred into the background — become distinct, stable clusters that standard
                        methods can actually find.</p>

                        <p>The key advantage over existing approaches is that filtering acts <em>before</em> state definition. 
                            Other methods, like coring, can only refine the states you already found---they can't recover states 
                            that were erased by projection.</p>

                        <p><strong>What we found</strong></p>

                        <p>We tested this on the villin headpiece HP35, a small protein that folds on a microsecond timescale.
                        Without filtering, the standard pipeline finds around 32 microstates. With Gaussian filtering applied
                        first, the number of well-defined microstates jumps to several hundred — revealing a much richer picture
                        of the folding funnel than previously seen for this system.</p>

                        <p><strong>Find more information here:</strong></p>
                        <ul>
                            <li><a href="https://pubs.acs.org/doi/10.1021/acs.jpclett.6c00341" class="text-blue-700 hover:text-blue-300">Paper: Lost in Projection? Gaussian Filtering Recovers Hidden Conformational States</a></li>
                            <li><a href="https://arxiv.org/abs/2602.21006" class="text-blue-700 hover:text-blue-300">arXiv preprint</a></li>
                        </ul>
                        `
                },
                {
                    id: 5,
                    image: "img/gp_vae.png",
                    imageX: 50, 
                    imageY: 10,
                    alt: "GP-VAE architecture",
                    date: "September 22, 2025",
                    readTime: "5 min read",
                    title: "GP-VAE out!",
                    excerpt: `Our paper on GP-VAEs just came out in JCP. Most methods for analyzing molecular dynamics simulations
                    treat each snapshot as if it exists in isolation — ignoring that the data has a natural time ordering.
                    We show that bringing time back into the picture reveals protein states that are simply invisible to standard approaches.`,
                    isPortrait: true,
                    fullContent: `<p>Imagine trying to understand how a protein moves by watching a flipbook. Each page shows the protein
                        at a single moment in time — thousands of atoms, all in slightly different positions from the page before.
                        To make sense of all this data, researchers typically compress it down to a few key variables. But here's
                        the catch: most methods shuffle the pages before doing that compression. They treat each snapshot as independent,
                        ignoring the fact that each frame follows directly from the one before it via Newton's laws of motion.</p>

                        <p>That's the problem we wanted to fix.</p>

                        <p><strong>Our approach</strong></p>

                        <p>We combined variational autoencoders — a type of neural network for compressing high-dimensional data — with
                        Gaussian processes, a statistical tool that naturally captures how things evolve over time. The result is a
                        method that reduces protein simulation data to a handful of meaningful variables while explicitly respecting
                        the time ordering of the data.</p>

                        <p><strong>What we found</strong></p>

                        <p>We tested this on T4 lysozyme, a well-studied enzyme that performs a simple open ↔ closed motion — think
                        Pac-Man. Numerous previous analyses of a 50 μs simulation of this protein found two main states: open and closed.</p>

                        <p>Our method found three. The open state actually contains two dynamically distinct sub-states that look
                        structurally identical. One of them transitions normally to the closed state. The other is kinetically isolated —
                        it never directly converts to closed, even though it is geometrically indistinguishable from the first.</p>

                        <p>Even more surprising: this hidden sub-state turned out to be linked to a completely different region of the
                        protein, one with no obvious structural connection to the opening motion. The link only becomes visible when you
                        account for the timing of events. The open ↔ closed transition only happens when that other region is in a
                        specific configuration — a functional dependency that purely structural methods simply cannot detect.</p>

                        <p><strong>Find more information here:</strong></p>
                        <ul>
                            <li><a href="https://doi.org/10.1063/5.0282147" class="text-blue-700 hover:text-blue-300">Paper: Recovering Hidden Degrees of Freedom Using Gaussian Processes</a></li>
                            <li><a href="https://github.com/moldyn/GP-TEMPEST" class="text-blue-700 hover:text-blue-300">Github Code</a></li>
                        </ul>
                        `
                },
                {
                    id: 4,
                    image: "img/defense.JPG",
                    imageX: 50, 
                    imageY: 10,
                    alt: "Defense Celebration",
                    date: "September 9, 2025",
                    readTime: "2 min read",
                    title: "Enters Dr. Diez!",
                    excerpt: "On September 9th, 2025, I successfully defended my PhD thesis!",
                    isPortrait: true,
                    fullContent: `<p>After roughly four years of research and countless cups of coffee (classic PhD humor, I know), 
                        I'm thrilled to announce that I successfully defended my PhD thesis on September 9th, 2025!</p>
                        <p>My committee consisted of Prof. Gerhard Stock, Prof. Günter Reiter and Prof. Joachim Dzubiella.
                        You can find my thesis <a href="https://freidok.uni-freiburg.de/data/271694" class="text-blue-700 hover:text-blue-300">here</a>.</p>
                        <p>I am extremely grateful and happy for all the support I have received during this journey,
                        especially from my supervisor Gerhard, who somehow managed to keep me on track and had 
                        a lot of patience during my more ambitious research ideas,
                        and my dear colleagues on the 10th floor of the Physics high-rise
                        (also for preparing this awesome doctoral hat).
                        Huge thanks to the friends and family who showed up and supported me on this special day. 
                        Afterwards we enjoyed nice finger food and drinks on the rooftop.</p>
                        <img src="img/defense2.JPG" alt="Celebration afterwards" style="width: 100%; max-width: 800px; height: auto; margin: 1.5rem auto; display: block; border-radius: 8px;">
                        `
                },
                {
                    id: 2,
                    image: "img/normi.png",
                    imageX: 50,
                    imageY: 50,
                    alt: " Normalized Mutual Information",
                    date: "August 2, 2024",
                    readTime: "4 min read",
                    title: "A correlation for the 21st century: Normalized Mutual Information",
                    excerpt: `Mutual information is a powerful way to measure correlations — but unlike the Pearson coefficient,
                    it has no upper bound, making it hard to interpret. We developed a normalization that fixes this
                    for data of any dimensionality, including multidimensional features such as 3D atomic coordinates.`,
                    isPortrait: true,
                    fullContent: `<p>Correlation is one of the most fundamental quantities in data analysis. 
                        In structural biology, you constantly want to know: do these two parts of the protein move together? 
                        Due to its simplicity and interpretability, the go-to tool is the Pearson correlation coefficient, which is bounded between -1 and 1.
                        </p>

                        <p>The problem is that Pearson is defined for scalar variables. Protein coordinates are three-dimensional,
                        and when you try to apply Pearson to 3D Cartesian coordinates, you get spurious patterns that depend
                        on the relative orientation of the coordinates rather than the actual physical motion or correlation. 
                        </p>

                        <p>Mutual information (MI), on the other hand, doesn't suffer from this problem — it makes no assumptions about the shape of
                        the data and handles multidimensional variables naturally. But MI has its own issue: it's unbounded.
                        A value of 0.4 could mean strong correlation in one context and weak correlation in another. Without
                        a proper normalization, it's hard to compare results across different systems or variables.</p>

                        <p><strong>Our approach</strong></p>

                        <p>We derived a normalization for MI that is invariant under variable transformations — meaning
                        it gives consistent results regardless of how you parametrize or rotate your coordinates. The key
                        ingredient is replacing the standard differential entropy with the relative entropy introduced by
                        Jaynes, which we estimate efficiently using k-nearest-neighbor statistics. The result is a
                        normalized MI that is bounded between 0 and 1, at essentially no extra computational cost compared
                        to the unnormalized version.</p>

                        <p><strong>What we found</strong></p>

                        <p>Applied to T4 lysozyme, the normalized MI correctly recovers the known allosteric coupling between
                        the hinge and mouth regions of the protein, and agrees well with the contact-based MoSAIC analysis.
                        We also showed that the arguably most widely used alternative normalization — the Gel'fand-Yaglom formula —
                        systematically overestimates correlations, assigning values around 0.7 to residue pairs that actually have hardly
                        any dynamic coupling at all.
                        And the standard Pearson coefficient, applied to Cartesian coordinates,
                        produces artifacts that have nothing to do with the actual dynamics.</p>

                        <p><strong>Find more information and the code here:</strong></p>
                        <ul>
                            <li><a href="https://doi.org/10.1063/5.0217960" class="text-blue-700 hover:text-blue-300">Paper: Accurate estimation of the normalized mutual information of multidimensional data</a></li>
                            <li><a href="https://github.com/moldyn/normi" class="text-blue-700 hover:text-blue-300">Github Code</a></li>
                        </ul>
                        `
                },
                {
                    id: 3,
                    image: "img/mosaic.png",
                    imageX: 50,
                    imageY: 50,
                    alt: "MoSAIC correlation clustering",
                    date: "August 1, 2022",
                    readTime: "4 min read",
                    title: "MoSAIC: detecting correlated motion in proteins",
                    excerpt: `Protein simulations produce data for thousands of atomic coordinates, most of which are noise.
                    MoSAIC identifies which ones actually matter by grouping coordinates that move together — separating
                    genuine collective motions from irrelevant fluctuations.`,
                    isPortrait: true,
                    fullContent: `<p>A typical protein simulation generates data for thousands of atomic coordinates. Most of them are
                        functually irrelevant — thermal noise, local fluctuations that don't tell you anything about how the protein
                        actually functions. If you feed all of that into a standard analysis, the noise drowns out the signal.</p>

                        <p>The usual fix is to manually pick which coordinates to look at. But that requires <em>a priori</em> knowledge of what matters
                        beforehand, which you often don't — especially if you're trying to discover something new.</p>

                        <p><strong>What MoSAIC does</strong></p>

                        <p>MoSAIC computes correlations between all pairs of coordinates in the simulation and uses a community
                        detection algorithm to group them into clusters of tightly correlated motion. Each cluster represents a
                        genuine collective process — coordinates that move together because they're part of the same functional
                        mechanism. Weakly correlated or isolated coordinates get flagged as noise and set aside.</p>

                        <p>The key idea is simple: correlation structure tells you a lot about what's physically meaningful, even
                        before you do any dimensionality reduction. Running MoSAIC first gives you a much cleaner starting point
                        for everything that follows.</p>

                        <p><strong>What we found</strong></p>

                        <p>Applied to T4 lysozyme, MoSAIC cleanly separates the open ↔ closed motion from other, unrelated
                        conformational changes happening elsewhere in the protein — without any prior knowledge of what to look
                        for. For villin headpiece, a small protein that folds on a microsecond timescale, it identifies the
                        contacts that actually drive the folding process.</p>

                        <p>Since then, MoSAIC has become a standard first step in our analyses and has been adopted
                        by other groups as a general-purpose feature selection tool for molecular dynamics data.</p>

                        <p><strong>Find more information here:</strong></p>
                        <ul>
                            <li><a href="https://doi.org/10.1021/acs.jctc.2c00337" class="text-blue-700 hover:text-blue-300">Paper: Correlation-based feature selection to identify functional dynamics in proteins</a></li>
                            <li><a href="https://github.com/moldyn/MoSAIC" class="text-blue-700 hover:text-blue-300">Github Code</a></li>
                        </ul>
                        `
                },
                {
                    id: 1,
                    image: "img/t4l_mechanism.jpg",
                    imageX: 50,
                    imageY: 50,
                    alt: "T4 lysozyme open-closed mechanism",
                    date: "June 8, 2022",
                    readTime: "4 min read",
                    title: "How T4 lysozyme communicates across its entire structure",
                    excerpt: `Allostery — where an event at one site in a protein triggers a response at a distant site — is
                    fundamental to how proteins function. We traced exactly how this signal travels through T4 lysozyme and
                    identified the network of contacts that makes the whole transition cooperative.`,
                    isPortrait: true,
                    fullContent: `<p>T4 lysozyme is one of the most studied proteins in structural biology.
                        Just like a Pac-Man, the two domains of the enzyme hinge relative to each other
                        and perform the open ↔ closed motion of the protein, which is essential to the 
                        its function.
                        However, the structural mechanism behind the transition had remained surprisingly unclear. 
                        How does a local motion at the hinge propagate all the way to
                        the distant mouth region?</p>

                        <p><strong>Finding the transmission network</strong></p>

                        <p>We used MoSAIC to systematically scan all pairwise contact distances in a long T4 lysozyme
                        simulation and identify which ones move in concert. The result was a network of 85 correlated
                        contacts spanning the protein from the hinge to the mouth — a continuous chain of residues that
                        collectively undergo a coordinated rearrangement whenever the protein switches between states.</p>

                        <p>At the heart of this network is a hydrophobic core formed by four residues: Phe4, Phe67,
                        Leu7, and Phe104. These residues sit at the interface between the two lobes and act like
                        interlocking cogwheels — a small rotation on one side produces a coupled displacement on the other.
                        It is this mechanical linkage that transmits the hinge motion to the mouth region.</p>

                        <p><strong>Cooperativity</strong></p>

                        <p>What makes the transition remarkable is that it's cooperative: all 85 contacts switch
                        simultaneously rather than sequentially. This all-or-nothing character is the hallmark of a
                        genuine allosteric mechanism, and it explains why the protein doesn't get trapped in partially
                        open or misfolded intermediate conformations on its way between states.</p>

                        <p><strong>Find more information here:</strong></p>
                        <ul>
                            <li><a href="https://doi.org/10.1016/j.jmb.2022.167679" class="text-blue-700 hover:text-blue-300">Paper: Cooperative Protein Allosteric Transition Mediated by a Fluctuating Transmission Network</a></li>
                        </ul>
                        `
                },
            ];

            // Calculate optimal layout
            const layout = calculateOptimalLayout(posts.length);

            // Create grid container with calculated dimensions
            container.style.width = layout.containerWidth + 'px';
            container.style.display = 'grid';
            container.style.gridTemplateColumns = `repeat(${layout.columns}, ${layout.cardWidth}px)`;
            container.style.gap = layout.gap + 'px';
            container.style.gridTemplateRows = 'auto';

            // Clear any existing content
            container.innerHTML = '';

            // Create and position cards
            posts.forEach((post, index) => {
                const cardElement = createPostCard(post);
                
                // Calculate position
                const row = Math.floor(index / layout.columns) + 1;
                const col = (index % layout.columns) + 1;
                
                // Explicitly set grid position
                cardElement.style.gridColumn = col;
                cardElement.style.gridRow = row;
                
                
                container.appendChild(cardElement);
            });
        }

        function calculateOptimalLayout(numPosts) {
            const screenWidth = window.innerWidth;
            const maxContainerWidth = Math.min(screenWidth - 100, 1400); // Leave some margin
            
            let columns, cardWidth, gap, containerWidth;
            
            if (screenWidth >= 1200) {
                // Large screens: Try to fit 3 columns
                columns = Math.min(3, numPosts);
                gap = 32;
                cardWidth = Math.floor((maxContainerWidth - (gap * (columns - 1))) / columns);
                containerWidth = (cardWidth * columns) + (gap * (columns - 1));
            } else if (screenWidth >= 768) {
                // Medium screens: 2 columns
                columns = Math.min(2, numPosts);
                gap = 24;
                cardWidth = Math.floor((maxContainerWidth - (gap * (columns - 1))) / columns);
                containerWidth = (cardWidth * columns) + (gap * (columns - 1));
            } else {
                // Small screens: 1 column
                columns = 1;
                gap = 16;
                cardWidth = Math.min(400, maxContainerWidth);
                containerWidth = cardWidth;
            }
            
            return { columns, cardWidth, gap, containerWidth };
        }

        function createPostCard(post) {
            const article = document.createElement('article');
            article.className = 'post-card';
            article.setAttribute('data-post', post.id);
            article.style.height = '510px';
            
            // Set object-position based on imageX and imageY parameters
            const imageX = post.imageX !== undefined ? post.imageX : 50; // Default to center (50%)
            const imageY = post.imageY !== undefined ? post.imageY : 50; // Default to center (50%)
            const objectPosition = `${imageX}% ${imageY}%`;
            
            // Extract plain text preview from fullContent
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = post.fullContent;
            const plainText = tempDiv.textContent || tempDiv.innerText || '';
            const preview = plainText.trim().replace(/\s+/g, ' ').substring(0, 300);

            article.innerHTML = `
                <div class="post-image-wrapper">
                    <img src="${post.image}"
                         alt="${post.alt}"
                         class="post-image"
                         style="object-position: ${objectPosition};">
                </div>
                <div class="post-content">
                    <button class="close-btn" onclick="closePost(event)">&times;</button>
                    <div>
                        <div class="post-meta">${post.date} • ${post.readTime}</div>
                        <h2 class="post-title">${post.title}</h2>
                        <div class="post-excerpt">
                            <p>${preview}</p>
                        </div>
                    </div>
                    <div class="post-card-footer">
                        <a href="#" class="read-more" onclick="expandPost(event, ${post.id}, ${post.isPortrait || false})">Read more →</a>
                    </div>
                    <div class="post-full-content">
                        ${post.fullContent}
                    </div>
                </div>
            `;
            
            return article;
        }

        // Recalculate layout on window resize
        window.addEventListener('resize', function() {
            createDynamicGrid();
        });

        function expandPost(event, postId, isPortrait = false) {
            event.preventDefault();
            event.stopPropagation();
            
            const postCard = document.querySelector(`[data-post="${postId}"]`);
            const overlay = document.getElementById('overlay');
            
            // Add expanded class
            postCard.classList.add('expanded');
            
            // Add portrait layout class if specified
            if (isPortrait) {
                postCard.classList.add('portrait-layout');
            }
            
            overlay.classList.add('active');
            
            // Prevent body scroll
            document.body.style.overflow = 'hidden';
            
            // Scroll to top of expanded post
            postCard.scrollTop = 0;
        }

        function closePost(event) {
            event.preventDefault();
            event.stopPropagation();
            
            const postCard = event.target.closest('.post-card');
            const overlay = document.getElementById('overlay');
            
            // Remove expanded and portrait-layout classes
            postCard.classList.remove('expanded', 'portrait-layout');
            overlay.classList.remove('active');
            
            // Restore body scroll
            document.body.style.overflow = 'auto';
        }

        // Close post when clicking overlay
        document.getElementById('overlay').addEventListener('click', function() {
            const expandedPost = document.querySelector('.post-card.expanded');
            if (expandedPost) {
                closePost({ target: expandedPost, preventDefault: () => {}, stopPropagation: () => {} });
            }
        });

        // Close post with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const expandedPost = document.querySelector('.post-card.expanded');
                if (expandedPost) {
                    closePost({ target: expandedPost, preventDefault: () => {}, stopPropagation: () => {} });
                }
            }
        });

        // Prevent clicks inside expanded post from closing it
        document.addEventListener('click', function(event) {
            const expandedPost = document.querySelector('.post-card.expanded');
            if (expandedPost && !expandedPost.contains(event.target) && !event.target.classList.contains('overlay')) {
                return;
            }
        });
    </script>
    <script src="./scripts/graph.js?v=3"></script>
